<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Virtual - ProyectoFinal+Silva</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Estilos Propios -->
    <link rel="stylesheet" href="css/estilos.css">

    <!-- Librerías Externas (primero) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Scripts propios (Sin Módulos) -->
    <script defer src="js/storage.js"></script>
    <script defer src="js/ui.js"></script>
    <script defer src="js/main.js"></script>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">💼</div>
            <h2>Billetera Virtual</h2>
            <p class="login-subtitle">Tu gestor de finanzas personales</p>

            <div class="login-form-group">
                <label>Nombre de usuario</label>
                <input type="text" id="input-login-usuario" placeholder="Ej: Jonathan" autocomplete="off">
            </div>
            <button class="btn-login" id="btn-ingresar">Ingresar →</button>

            <div id="usuarios-existentes" style="display:none;">
                <p class="usuarios-lista-titulo">Usuarios guardados</p>
                <div class="usuarios-chips" id="chips-container"></div>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen">
        <!-- Navbar -->
        <nav class="navbar">
            <span class="navbar-brand">💼 Billetera</span>
            <div class="navbar-user">
                <div class="avatar" id="avatar-inicial">?</div>
                <span id="navbar-nombre">Usuario</span>
                <button class="btn-logout" id="btn-cerrar-sesion">Salir</button>
            </div>
        </nav>

        <div class="main-content">
            <!-- Estadísticas -->
            <div class="stats-grid">
                <div class="stat-card principal">
                    <div class="stat-label">Balance Actual</div>
                    <div class="stat-valor valor-neutro" id="balance-valor">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏦</div>
                    <div class="stat-label">Presupuesto</div>
                    <div class="stat-valor" id="presupuesto-valor">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-label">Ingresos</div>
                    <div class="stat-valor valor-positivo" id="total-ingresos">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📉</div>
                    <div class="stat-label">Gastos</div>
                    <div class="stat-valor valor-negativo" id="total-gastos">$0</div>
                </div>
            </div>

            <!-- Configuración -->
            <div class="card">
                <p class="card-title">⚙ Configuración</p>
                <div class="form-row-presupuesto">
                    <input type="number" id="input-presupuesto" placeholder="Ingresá tu presupuesto base">
                    <button class="btn-secondary" id="btn-guardar-presupuesto">Guardar</button>
                </div>
                <button class="btn-danger-outline" id="btn-reiniciar-todo">🗑 Borrar todos mis datos</button>
            </div>

            <!-- Formulario -->
            <div class="card">
                <p class="card-title">＋ Nueva Transacción</p>
                <form id="formulario-gastos">
                    <div class="form-row">
                        <input type="text" id="input-descripcion" placeholder="Descripción (ej: Supermercado)">
                    </div>
                    <div class="form-row form-row-2">
                        <input type="number" id="input-monto" placeholder="Monto ($)">
                        <select id="select-tipo">
                            <option value="gasto">💸 Gasto</option>
                            <option value="ingreso">💰 Ingreso</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Registrar Movimiento</button>
                </form>
            </div>

            <!-- Historial -->
            <div class="card">
                <p class="card-title">📋 Historial de Movimientos</p>
                <div class="history-list" id="contenedor-transacciones">
                    <!-- Dinámico desde JS -->
                </div>
            </div>
        </div>
    </div>

</body>
</html>
