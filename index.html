<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Virtual - Versión Estándar</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Estilos Propios -->
    <link rel="stylesheet" href="css/estilos.css">

    <!-- Librerías Externas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Scripts propios -->
    <script defer src="js/storage.js"></script>
    <script defer src="js/ui.js"></script>
    <script defer src="js/main.js"></script>
</head>
<body class="mesh-bg">

    <!-- APP PRINCIPAL - ACCESO DIRECTO -->
    <div id="app-screen">
        <nav class="navbar">
            <div class="navbar-content">
                <span class="navbar-brand">💼 Mi Billetera</span>
                <div class="navbar-right">
                    <span id="header-fecha" class="header-date">Cargando fecha...</span>
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">Online</span>
                    </div>
                </div>
            </div>
        </nav>

        <div class="app-centered-container">
            <!-- Estadísticas (Original Style) -->
            <section class="stats-section">
                <div class="stat-card principal">
                    <div class="stat-label">Balance Actual</div>
                    <div class="stat-valor" id="balance-valor">$0</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🏦</div>
                        <div class="stat-label">Presupuesto</div>
                        <div class="stat-valor" id="presupuesto-valor">$0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📈</div>
                        <div class="stat-label">Ingresos</div>
                        <div class="stat-valor valor-positivo" id="total-ingresos">$0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📉</div>
                        <div class="stat-label">Gastos</div>
                        <div class="stat-valor valor-negativo" id="total-gastos">$0</div>
                    </div>
                </div>
            </section>

            <!-- Definir Presupuesto -->
            <div class="card">
                <p class="card-title">💰 Definir Presupuesto</p>
                <div class="form-row-presupuesto">
                    <div style="flex:1">
                        <input type="text" id="input-presupuesto" placeholder="Ej: 50000" inputmode="decimal">
                        <small class="input-hint">Monto sin puntos de miles (ej: 5000)</small>
                    </div>
                    <button class="btn-secondary" id="btn-guardar-presupuesto">Guardar</button>
                </div>
                <!-- Barra de Progreso -->
                <div id="card-progreso" style="display:none; margin-top: 20px;">
                    <div class="progreso-header">
                        <span class="progreso-restante" id="progreso-restante-label">$0 restantes</span>
                        <span id="progreso-pct">0% usado</span>
                    </div>
                    <div class="barra-container">
                        <div class="barra-fill" id="barra-fill"></div>
                    </div>
                </div>
            </div>

            <!-- Nueva Transacción -->
            <div class="card">
                <p class="card-title">＋ Nueva Transacción</p>
                <form id="formulario-gastos">
                    <div class="form-row">
                        <input type="text" id="input-descripcion" placeholder="Descripción (ej: Supermercado)" list="lista-categorias">
                        <datalist id="lista-categorias"></datalist>
                    </div>
                    <div class="form-row form-row-2">
                        <div>
                            <input type="text" id="input-monto" placeholder="Ej: 1250.50" inputmode="decimal">
                            <small class="input-hint">Punto para decimales</small>
                        </div>
                        <select id="select-tipo">
                            <option value="gasto">💸 Gasto</option>
                            <option value="ingreso">💰 Ingreso</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Registrar Movimiento</button>
                </form>
            </div>

            <!-- Zona de Borrado -->
            <div class="card">
                <p class="card-title">⚠️ Zona de Limpieza</p>
                <button class="btn-danger-outline" id="btn-reiniciar-todo" style="width: 100%;">🧹 Borrar Todo</button>
            </div>

            <!-- Historial al Final -->
            <section class="section-historial">
                <h3 class="section-title">📋 Historial de Movimientos</h3>
                <div class="history-list-centered" id="contenedor-transacciones">
                    <!-- Dinámico -->
                </div>
            </section>
        </div>
    </div>

</body>
</html>
